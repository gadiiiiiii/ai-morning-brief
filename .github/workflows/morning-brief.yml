name: AI Morning Brief

on:
  schedule:
    # Runs at 7:00 AM Eastern Time (Indianapolis) every day
    # 7 AM EDT (Mar–Nov) = 11:00 UTC
    # 7 AM EST (Nov–Mar) = 12:00 UTC  ← will run at 7 AM in winter too if you change to '0 12 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch: # lets you trigger it manually from GitHub too

jobs:
  send-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate and send brief
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:     ${{ secrets.RECIPIENT_EMAIL }}
        run: python send_brief.py
